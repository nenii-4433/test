<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — RawTee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">Raw<span>Tee</span></a>
      <nav class="nav">
        <a href="/">← Back to Product</a>
      </nav>
    </div>
  </header>

  <main class="checkout-page">
    <div class="container checkout-grid">

      <form class="checkout-form" id="checkout-form">
        <h2 class="form-title">Lock In Your Fit</h2>

        <div id="alert-box"></div>

        <div class="form-group">
          <label for="name">Full Name *</label>
          <input type="text" id="name" name="name" required placeholder="John Doe">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com">
          </div>
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000">
          </div>
        </div>

        <div class="form-group">
          <label for="address">Street Address *</label>
          <input type="text" id="address" name="address" required placeholder="123 Main Street">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="city">City *</label>
            <input type="text" id="city" name="city" required placeholder="New York">
          </div>
          <div class="form-group">
            <label for="state">State / Province *</label>
            <input type="text" id="state" name="state" required placeholder="NY">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="size">Size *</label>
            <select id="size" name="size" required>
              <option value="">Select size</option>
              <option value="S">S</option>
              <option value="M">M</option>
              <option value="L">L</option>
              <option value="XL">XL</option>
              <option value="2XL">2XL</option>
              <option value="3XL">3XL</option>
              <option value="4XL">4XL</option>
              <option value="5XL">5XL</option>
            </select>
          </div>
          <div class="form-group">
            <label for="country">Country *</label>
            <select id="country" name="country" required>
              <option value="">Select country</option>
              <option value="US">United States</option>
              <option value="CA">Canada</option>
              <option value="GB">United Kingdom</option>
              <option value="AU">Australia</option>
              <option value="DE">Germany</option>
              <option value="FR">France</option>
              <option value="IN">India</option>
              <option value="PK" selected>Pakistan</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="zip">ZIP / Postal Code *</label>
            <input type="text" id="zip" name="zip" required placeholder="54000">
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-glow" style="width:100%;margin-top:8px" id="pay-btn">
          Secure the Fit →
        </button>
        <p class="secure-note">🔒 SafePay secured — your card details never touch our servers</p>
      </form>

      <aside class="order-summary">
        <h3 class="form-title">Order Summary</h3>
        <div class="summary-product">
          <img src="/images/MZCHYHAM2551-media-1.jpg" alt="Product" id="summary-image">
          <div class="summary-product-info">
            <h4 id="summary-name">RawTee Nike Print Shirt White</h4>
            <p id="summary-size">Size: —</p>
            <p id="summary-qty">Qty: 1</p>
          </div>
        </div>
        <div class="summary-row summary-compare" id="summary-compare-row">
          <span>Was</span>
          <span class="price-compare" id="summary-compare">PKR 3,000</span>
        </div>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">PKR 2,000</span>
        </div>
        <div class="summary-row summary-savings">
          <span>You save</span>
          <span id="summary-savings" style="color:var(--success)">PKR 1,000</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span id="summary-shipping">PKR 200</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summary-total">PKR 2,000</span>
        </div>
      </aside>

    </div>
  </main>

  <script src="/js/checkout.js"></script>
</body>
</html>
